name: Daily E2E Smoke Test

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  e2e:
    name: Full wizard flow (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpx playwright install chromium --with-deps

      - name: Run E2E tests
        env:
          TEST_BASE_URL: ${{ secrets.PRODUCTION_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}
          CLERK_TEST_USER_ID: ${{ secrets.CLERK_TEST_USER_ID }}
        run: pnpm e2e

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
